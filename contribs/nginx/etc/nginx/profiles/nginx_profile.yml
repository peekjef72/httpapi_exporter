  nginx:
    # all metrics will be named "[metric_prefix]_[metric_name]"
    metric_prefix: "nginx"
    scripts:
      init:
        - name: init default value for apache httpd mod_status url
          set_fact:
            status_url: /server_status
      login: ~
      logout: ~

      # method call to determine if a target is responding; will call login() if necessary
      ping:
        - name: check if API is replying
          query:
            url: $status_url
            method: GET
            # headers:
            ok_status: 200
            var_name: status
            parser: text-lines
            # debug: true
            # trace: true
        - name: analyze login response ok
          set_fact:
            logged: true
          when:
            - "js: status_code == 200"
