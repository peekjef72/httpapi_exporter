---

# https://raw.githubusercontent.com/jorgedlcruz/veeam-enterprise_manager-grafana/master/veeam_enterprisemanager.sh
###
## Veeam Enterprise Manager Backup Servers. Overview of Backup Repositories
## docs: https://helpcenter.veeam.com/docs/backup/em_rest/backupservers.html?ver=120
## docs: https://helpcenter.veeam.com/docs/vbr/em_rest/backupservers.html?ver=13
###
#

collector_name: veeam_backup_servers_metrics
# no cache
# min_interval: 0s
metric_prefix: veeam_em_backup_servers

scripts:
  get backup_servers:
    - name: init names
      when: "js: typeof backupServersNames === 'undefined'"
      set_fact:
        backupServersNames: 'js: veeam.backupServersNames(veeam_version)'

    - name: collect elements
      query:
        url: /backupServers?format=Entity
        var_name: results
        # debug: true

    - name: proceed elements
      loop: $results[$backupServersNames.backupServers]
      actions:
        - name: build labels
          set_fact:
            key_labels:
              name:         $item[$backupServersNames.name]
              description:  $item[$backupServersNames.description]
              port:         $item[$backupServersNames.port]
              full_version: $item[$backupServersNames.version]
              version:      "js: veeam.veeamVersion(item[backupServersNames.version])"
        - name: build metrics
          scope: none
          metrics:
            - metric_name: config
              help: config of each backup repository 
              type: gauge
              key_labels: $key_labels
              values:
                _: 1

...
