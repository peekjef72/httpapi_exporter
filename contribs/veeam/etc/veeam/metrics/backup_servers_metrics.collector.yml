---

# https://raw.githubusercontent.com/jorgedlcruz/veeam-enterprise_manager-grafana/master/veeam_enterprisemanager.sh
###
## Veeam Enterprise Manager Backup Servers. Overview of Backup Repositories
## docs: https://helpcenter.veeam.com/docs/backup/em_rest/backupservers.html?ver=120
###
#

collector_name: backup_servers_metrics
# no cache
# min_interval: 0s
metric_prefix: veeam_em_backup_servers

scripts:
  get backup_servers:
    - name: collect elements
      query:
        url: /backupServers?format=Entity
        var_name: results

    - name: proceed elements
      scope: results
      metrics:
        - metric_name: config
          help: config of each backup repository 
          type: gauge
          # implicit scope to item !
          key_labels:
            name:         $Name
            description:  $Description
            port:         $Port
            full_version: $Version
            version:      >-
              js:
                var vers = Version;
                switch (vers) {
                  case "12.3.2.3617":
                    vers = "12.3.2"; break;
                  case "12.3.1.1139":
                    vers = "12.3.1"; break;
                  case "12.3.0.310":
                    vers = "12.3.0"; break;
                  case "12.2.0.334":
                    vers = "12.2.0"; break;
                  case "12.1.2.172":
                    vers = "12.1.2"; break;
                  case "12.1.1.56":
                    vers = "12.1.1"; break;
                  case "12.1.0.2131":
                    vers = "12.1.0"; break;

                  case "12.0.0.1420":
                    vers = "12.0 GA"; break;
                  case "12.0.0.1402":
                    vers = "12.0 RTM"; break;
                  case "11.0.0.837":
                    vers = "11.0 GA"; break;
                  case "11.0.0.825":
                    vers = "11.0 RTM"; break;
                  case "10.0.1.4854":
                    vers = "10.0a GA"; break;
                  case "10.0.1.4848":
                    vers = "10.0a RTM"; break;
                  case "10.0.0.4461":
                    vers = "10.0 GA"; break;
                  case "10.0.0.4442":
                    vers = "10.0 RTM"; break;
                  case "9.5.4.2866":
                    vers = "9.5 U4b GA"; break;
                  case "9.5.4.2753":
                    vers = "9.5 U4a GA"; break;
                  case "9.5.4.2615":
                    vers = "9.5 U4 GA"; break;
                  case "9.5.4.2399":
                    vers = "9.5 U4 RTM"; break;
                  case "9.5.0.1922":
                    vers = "9.5 U3a"; break;
                  case "9.5.0.1536":
                    vers = "9.5 U3"; break;
                  case "9.5.0.1038":
                    vers = "9.5 U2"; break;
                  case "9.5.0.823":
                    vers = "9.5 U1"; break;
                  case "9.5.0.802":
                    vers = "9.5 U1 RC"; break;
                  case "9.5.0.711":
                    vers = "9.5 GA"; break;
                  case "9.5.0.580":
                    vers = "9.5 RTM"; break;
                  case "9.0.0.1715":
                    vers = "9.0 U2"; break;
                  case "9.0.0.1491":
                    vers = "9.0 U1"; break;
                  case "9.0.0.902":
                    vers = "9.0 GA"; break;
                  case "9.0.0.773":
                    vers = "9.0 RTM"; break;
                  case "8.0.0.2084":
                    vers = "8.0 U3"; break;
                  case "8.0.0.2030":
                    vers = "8.0 U2b"; break;
                  case "8.0.0.2029":
                    vers = "8.0 U2a"; break;
                  case "8.0.0.2021":
                    vers = "8.0 U2 GA"; break;
                  case "8.0.0.2018":
                    vers = "8.0 U2 RTM"; break;
                  case "8.0.0.917":
                    vers = "8.0 P1"; break;
                  case "8.0.0.817":
                    vers = "8.0 GA"; break;
                  case "8.0.0.807":
                    vers = "8.0 RTM"; break;
                }
                vers
          values:
            _: 1
          loop: $BackupServers

...
